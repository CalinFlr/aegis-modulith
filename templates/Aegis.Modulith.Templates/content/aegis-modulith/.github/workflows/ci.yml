name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore
      - run: dotnet build -c Release --no-restore
      - run: dotnet test -c Release --no-build
#if (guardrails != "off")
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm run check
#endif

#if (profile != "core")
  container:
    runs-on: ubuntu-latest
    needs: dotnet
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: docker build --pull -t aegis-template-api:ci .

  deployment-placeholder:
    runs-on: ubuntu-latest
    needs: container
    if: github.event_name == 'workflow_dispatch' && vars.ENABLE_DEPLOYMENT_PLACEHOLDER == 'true'
    environment: deployment-placeholder
    steps:
      - name: Deployment intentionally not configured
        run: |
          echo "Container validation passed."
          echo "Add registry login, image push, and provider-specific deployment steps in your own repository."
#endif
